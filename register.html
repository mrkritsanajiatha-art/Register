<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครเข้าอบรม - สมาพันธ์แพลตฟอร์มการศึกษาและอาชีพแห่งประเทศไทย</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .form-container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--color-surface);
            padding: var(--spacing-lg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--color-border);
        }
        .form-group {
            margin-bottom: var(--spacing-md);
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 1rem;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-light);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="brand-logo">
                <i class="ph-fill ph-graduation-cap"></i>
                <span>สมาพันธ์ฯ</span>
            </a>
            <div class="nav-actions">
                <a href="index.html" class="btn btn-outline">กลับหน้าหลัก</a>
            </div>
        </div>
    </header>

    <main class="bg-muted" style="padding-bottom: 40px;">
        <div class="container">
            <div class="form-container">
                <div class="text-center" style="margin-bottom: var(--spacing-lg);">
                    <h1 class="section-title">แบบฟอร์มสมัครเข้าร่วมอบรม</h1>
                    <p class="section-description">โปรดกรอกข้อมูลให้ครบถ้วนเพื่อประโยชน์ในการรับเกียรติบัตร</p>
                </div>

                <form id="registerForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="firstName">ชื่อ (ไม่ต้องระบุคำนำหน้า)</label>
                            <input type="text" id="firstName" name="firstName" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="lastName">นามสกุล</label>
                            <input type="text" id="lastName" name="lastName" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="email">อีเมล</label>
                            <input type="email" id="email" name="email" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="phone">เบอร์โทรศัพท์</label>
                            <input type="tel" id="phone" name="phone" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="province">จังหวัด</label>
                        <select id="province" name="province" class="form-control" required>
                            <option value="">เลือกจังหวัด</option>
                            <option value="กรุงเทพมหานคร">กรุงเทพมหานคร</option>
                            <option value="เชียงใหม่">เชียงใหม่</option>
                            <option value="ขอนแก่น">ขอนแก่น</option>
                            <option value="อื่นๆ">อื่นๆ</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="organization">โรงเรียน / หน่วยงาน</label>
                            <input type="text" id="organization" name="organization" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="position">ตำแหน่ง</label>
                            <input type="text" id="position" name="position" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="package">ประเภทการสมัคร</label>
                        <select id="package" name="package" class="form-control" required>
                            <option value="">เลือกประเภท</option>
                            <option value="บุคคลทั่วไป">บุคคลทั่วไป (ราคาปกติ)</option>
                            <option value="นักเรียน/นักศึกษา">นักเรียน/นักศึกษา (ส่วนลด 50%)</option>
                            <option value="สมาชิกสมาพันธ์">สมาชิกสมาพันธ์ (ฟรี)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">หลักสูตรที่ต้องการสมัคร (เลือกได้มากกว่า 1)</label>
                        <div class="checkbox-group">
                            <input type="checkbox" id="course1" name="courses" value="Web Development Bootcamp 2026">
                            <label for="course1">Web Development Bootcamp 2026 (ฟรี)</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="course2" name="courses" value="Data Analytics for Educators">
                            <label for="course2">Data Analytics for Educators (฿990)</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="course3" name="courses" value="UX/UI Design Foundations">
                            <label for="course3">UX/UI Design Foundations (฿1,290)</label>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 40px;">
                        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="submitBtn">ยืนยันการสมัครและดำเนินการชำระเงิน</button>
                    </div>
                    
                    <div id="statusMessage" style="display:none; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center;"></div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/register.js"></script>
</body>
</html>
