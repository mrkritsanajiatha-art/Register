<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - สมาพันธ์แพลตฟอร์มการศึกษาและอาชีพแห่งประเทศไทย</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Firebase SDK (Version 9+ Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--color-muted);
        }
        .login-card {
            background: var(--color-surface);
            padding: var(--spacing-lg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-logo {
            font-size: 3rem;
            color: var(--color-primary);
            margin-bottom: 10px;
        }
        .login-title {
            margin-bottom: var(--spacing-md);
            font-family: var(--font-display);
        }
        .form-control {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
        }
        #loginError {
            color: #991B1B;
            background: #FEE2E2;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <i class="ph-fill ph-shield-check login-logo"></i>
        <h2 class="login-title">Admin System</h2>
        
        <div id="loginError"></div>

        <form id="loginForm">
            <input type="email" id="adminEmail" class="form-control" placeholder="Email Address" required>
            <input type="password" id="adminPassword" class="form-control" placeholder="Password" required>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="loginBtn">เข้าสู่ระบบ</button>
        </form>
        <p style="margin-top: 20px; font-size: 0.875rem;">
            <a href="index.html" style="color: var(--color-ink-muted);">กลับหน้าหลัก</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
